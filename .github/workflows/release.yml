name: "v1.2.0 Build & Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            bundles: "dmg"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            bundles: "dmg"
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
            bundles: "deb,rpm,appimage"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            bundles: "nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies (ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev

      - name: install frontend dependencies
        run: npm install

      - name: Sync version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ $VERSION == v* ]]; then VERSION=${VERSION#v}; fi
          echo "Syncing version to $VERSION"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sunder ${{ github.ref_name }}"
          releaseBody: "See release_notes.md for changes."
          args: "--target ${{ matrix.target }} --bundles ${{ matrix.bundles }}"
